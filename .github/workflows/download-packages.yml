name: Sync Julia Depot

on:
  workflow_dispatch:
    inputs:
      package_list:
        description: 'Package names (space-separated)'
        required: true
        default: 'Example'
      julia_version:
        description: 'Julia version'
        required: true
        default: '1.11.9'

jobs:
  sync-depot:
    runs-on: windows-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Ensure depot-build branch exists
        shell: bash
        run: |
          git fetch origin
          if ! git ls-remote --heads origin depot-build | grep depot-build; then
            git checkout --orphan depot-build
            git rm -rf . || true
            git commit --allow-empty -m "Init depot-build"
            git push origin depot-build
            git checkout main
          fi

      - name: Checkout depot-build branch into depot_repo
        uses: actions/checkout@v4
        with:
          ref: depot-build
          path: depot_repo

      - name: Configure Git in depot_repo
        shell: bash
        working-directory: depot_repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ inputs.julia_version }}

      - name: Debug depot path
        shell: bash
        env:
          JULIA_DEPOT_PATH: ${{ github.workspace }}\depot_repo
        run: |
          julia -e 'println("DEPOT_PATH = ", DEPOT_PATH)'
          julia -e 'println("pwd = ", pwd())'

      - name: Install packages directly into depot_repo
        shell: bash
        env:
          JULIA_DEPOT_PATH: ${{ github.workspace }}\depot_repo
          JULIA_ARTIFACTS_NO_PRECOMPILE: "true"
        run: |
          julia -e 'using Pkg; Pkg.add(split(raw"""${{ inputs.package_list }}"""))'

      - name: Force commit all changes
        shell: bash
        working-directory: depot_repo
        run: |
          git add -A
          git status
          if ! git diff --cached --quiet; then
            git commit -m "Update depot: ${{ inputs.package_list }}"
            git push origin depot-build
          else
            echo "=== NO CHANGES ==="
            find . -maxdepth 2 -type d | head -200
          fi
